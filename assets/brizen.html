    <path d="M50,60 C44,51 42,39 47,30 C50,22 55,28 56,18 C61,28 58,22 63,14 C61,28 65,36 65,47 C68,39 67,31 63,24 C70,36 69,50 62,60 C59,65 55,67 50,60Z" fill="white" opacity=".95"/>
  </svg>`;
  return`<div class="streak-page">
    <div class="streak-bg-glow"></div>
    <div class="streak-embers" id="streak-embers-el"></div>
    <div class="streak-pop-wrap">
      <div class="streak-row">
        <div class="streak-flame-sm">${flameSVG}</div>
        <div class="streak-num">${display}</div>
      </div>
    </div>
    <div class="streak-lbl" style="animation:sSlide .4s .28s both">day streak</div>
    <div class="streak-msg" style="animation:sSlide .4s .38s both">${msg}</div>
    <button class="streak-btn" style="animation:sSlide .4s .46s both" onclick="closeModal()">Keep the Fire Burning →</button>
  </div>`;
}
function renderTopBar(){
  const xp=computeXP();const lv=levelFromXP(xp);
  const str=S.habits.reduce((m,h)=>Math.max(m,streak(h.id)),0);
  const avatarEl=S.photoURL
    ?`<img src="${S.photoURL}" style="width:30px;height:30px;border-radius:50%;object-fit:cover;cursor:pointer;border:1.5px solid #2563EB44" onclick="go('profile')" referrerpolicy="no-referrer">`
    :`<div style="width:30px;height:30px;cursor:pointer" onclick="go('profile')">${LEVEL_BADGES[lv-1]}</div>`;
  const light=isLightMode();
  return`<div class="tb-avatar" style="background:none;border:none;width:30px;height:30px;padding:0">${avatarEl}</div>
    <div class="tb-stats">
      <div class="tb-stat" onclick="go('history')">${FLAME_ICON}<span class="tb-stat-val">${str}</span></div>
      <div class="tb-divider"></div>
      <div class="tb-stat" onclick="go('progress')"><span class="tb-stat-icon">⚡</span><span class="tb-stat-val">${fmtXP(xp)}</span></div>
      <div class="tb-divider"></div>
      <div class="tb-stat" onclick="go('progress')" style="gap:6px"><div style="width:22px;height:22px;flex-shrink:0">${LEVEL_BADGES[lv-1]}</div><span class="tb-stat-val" style="font-size:11px;color:var(--text-sub)">Lv ${lv}</span></div>
      <button class="tb-theme-btn" onclick="toggleTheme()" title="${light?'Dark mode':'Light mode'}">${light?'🌙':'☀️'}</button>
    </div>`;
}
function showPerfectDay(){
  const mr=document.getElementById('modal-root');
  const total=S.habits.length;
  mr.innerHTML=`<div class="pd-overlay" id="pd-overlay">
    <div class="pd-ring">
      <svg viewBox="0 0 46 46" fill="none" xmlns="http://www.w3.org/2000/svg">
        <path d="M10 24 L20 34 L37 14" stroke="white" stroke-width="3.5" stroke-linecap="round" stroke-linejoin="round"/>
      </svg>
    </div>
    <div class="pd-title">ALL DONE</div>
    <div class="pd-sub">${total} habit${total!==1?'s':''} complete today</div>
  </div>`;
  playSound('save');
  setTimeout(()=>{
    const el=document.getElementById('pd-overlay');
    if(el)el.classList.add('pd-out');
    setTimeout(()=>{mr.innerHTML='';},300);
  },1700);
}
function renderTabBar(){
  return TABS.map(t=>`<button class="tab ${S.tab===t.id?'active':''}" onclick="go('${t.id}')">
    <span class="tab-icon">${t.icon}</span><span class="tab-label">${t.label}</span>
  </button>`).join('');
}
function render(){
  const tabbar=document.getElementById('tabbar');
  const scr=document.getElementById('screen');
  const mr=document.getElementById('modal-root');
  const tb=document.getElementById('topbar-el');
  if(S.screen==='landing'||S.screen==='email'||S.screen==='onboard'){
    if(tb)tb.style.display='none';
    tabbar.style.display='none';
    scr.innerHTML=S.screen==='landing'?renderLanding():S.screen==='email'?renderEmailPage():renderOnboard();
    mr.style.pointerEvents='none';mr.innerHTML='';
    return;
  }
  if(tb){tb.style.display='flex';tb.innerHTML=renderTopBar();}
  tabbar.style.display='';
  const screens={today:renderToday,history:renderHistory,challenges:renderChallenges,progress:renderProgress,profile:renderProfile};
  scr.innerHTML=screens[S.tab]();
  tabbar.innerHTML=renderTabBar();
  if(S.modal==='add'){
    mr.style.pointerEvents='auto';mr.innerHTML=renderAddModal();
    setTimeout(()=>{const i=document.getElementById('hinp');if(i)i.focus();},30);
  } else if(S.modal==='detail'){
    mr.style.pointerEvents='auto';mr.innerHTML=renderDetailModal();
  } else if(S.modal==='del'){
    mr.style.pointerEvents='auto';mr.innerHTML=renderDelModal();
  } else if(S.modal==='history'){
    mr.style.pointerEvents='auto';mr.innerHTML=renderHistoryModal();
  } else if(S.modal==='streak'){
    mr.style.pointerEvents='auto';mr.innerHTML=renderStreakModal();
    requestAnimationFrame(spawnStreakEmbers);
  } else if(S.modal==='levelup'){
    mr.style.pointerEvents='auto';mr.innerHTML=renderLevelUpModal();
    playSound('levelup');
    requestAnimationFrame(()=>{
      spawnLuParticles();
      const f=document.getElementById('lu-xp-bar-fill');
      if(f){
        const lv=S.levelUpTo||S.seenLevel;
        const xp=computeXP();
        const lo=LEVEL_THRESHOLDS[lv-1]||0;
        const hi=LEVEL_THRESHOLDS[lv]||lo+2000;
        const pct=Math.min(100,Math.max(0,Math.round((xp-lo)/(hi-lo)*100)));
        setTimeout(()=>{f.style.width=pct+'%';},120);
      }
    });
  } else {
    mr.style.pointerEvents='none';mr.innerHTML='';document.getElementById('screen').scrollTop=0;
  }
  if((S.tab==='progress'||S.tab==='profile')&&S.modal!=='levelup'){
    requestAnimationFrame(()=>{
      const bar=document.getElementById('xp-bar-fill');
      if(bar){const pct=bar.dataset.pct||0;setTimeout(()=>{bar.style.width=pct+'%';},60);}
      const cur=document.getElementById('badge-cur');
      if(cur){cur.scrollIntoView({behavior:'smooth',block:'nearest'});}
    });
  }
}

// ── THEME ─────────────────────────────────────────────────────────
function toggleTheme(){
  const light=document.documentElement.classList.toggle('light');
  localStorage.setItem('briz_theme',light?'light':'dark');
  render();
}
function isLightMode(){return document.documentElement.classList.contains('light');}

// ── INIT ──────────────────────────────────────────────────────────
if(localStorage.getItem('briz_theme')==='light')document.documentElement.classList.add('light');
load();
if(S.screen==='app')generateDemoHistory();
render();
</script>
</body>
</html>
