<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>BRAIZEN</title>
<style>
:root{
  /* Surfaces */
  --bg:#040407;--card:#08080D;--border:#111118;
  /* Primary → Blue */
  --purple:#3B82F6;--purple-dark:#1D4ED8;--purple-glow:rgba(59,130,246,0.15);--purple-light:#93C5FD;
  /* Accents - kept as variables but mostly unused */
  --blue:#3B82F6;--gold:#F5A623;--green:#2DD4A0;--red:#FF6070;--cyan:#22D3EE;
  /* Text */
  --white:#FFFFFF;--text:#E8E8EE;--text-sub:#72728A;--text-muted:#38384E;
}
*{box-sizing:border-box;margin:0;padding:0;}
body{background:var(--bg);color:var(--text);font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;height:100vh;overflow:hidden;display:flex;justify-content:center;}
#app{display:flex;flex-direction:column;height:100vh;width:100%;max-width:480px;}
#screen{flex:1;overflow-y:auto;overflow-x:hidden;}
#screen::-webkit-scrollbar{display:none;}
#modal-root{position:fixed;inset:0;z-index:200;pointer-events:none;}

/* TAB BAR */
#tabbar{background:var(--bg);border-top:1px solid var(--border);display:flex;height:58px;padding-top:4px;flex-shrink:0;}
.tab{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;cursor:pointer;border:none;background:none;padding:0;gap:3px;transition:opacity .2s;}
.tab-icon{font-size:19px;opacity:0.3;transition:opacity .2s;}
.tab.active .tab-icon{opacity:1;}
.tab-label{font-size:9px;color:var(--text-muted);letter-spacing:.3px;transition:color .2s;}
.tab.active .tab-label{color:var(--purple-light);font-weight:600;}

/* SHARED */
.header{display:flex;align-items:center;justify-content:space-between;padding:16px 20px;}
.app-name{font-size:16px;font-weight:800;letter-spacing:2.5px;color:var(--white);}
.date-txt{font-size:11px;color:var(--text-muted);margin-top:2px;}
.streak-badge{display:flex;align-items:center;gap:4px;background:rgba(255,255,255,0.05);border:1px solid rgba(255,255,255,0.08);border-radius:999px;padding:5px 11px;}
.streak-num{color:var(--white);font-weight:700;font-size:13px;}
.section-title{font-size:10px;font-weight:600;color:var(--text-muted);margin-bottom:12px;padding:0 20px;letter-spacing:1.5px;text-transform:uppercase;}
.pb{padding-bottom:40px;}
.stats-grid{display:flex;gap:10px;padding:0 20px;margin-bottom:24px;}
.stat-card{flex:1;background:var(--card);border:1px solid var(--border);border-radius:16px;padding:12px;text-align:center;transition:transform .15s,background .15s;}
.stat-card:active{transform:scale(0.97);}
.stat-icon{font-size:18px;margin-bottom:6px;}
.stat-val{font-size:17px;font-weight:800;margin-bottom:2px;}
.stat-lbl{font-size:10px;color:var(--text-sub);}
.empty-state{text-align:center;padding:60px 30px;}
.empty-icon{font-size:52px;margin-bottom:16px;}
.empty-title{font-size:18px;font-weight:700;color:var(--text);margin-bottom:8px;}
.empty-sub{font-size:14px;color:var(--text-sub);line-height:1.5;}

/* FOCUS CARD */
.focus-card{margin:0 20px 20px;background:var(--card);border:1px solid var(--border);border-radius:24px;padding:20px 22px;display:flex;align-items:center;justify-content:space-between;transition:border-color .2s;}
.focus-label{font-size:10px;font-weight:600;color:var(--text-muted);letter-spacing:1.5px;text-transform:uppercase;margin-bottom:8px;}
.focus-title{font-size:24px;font-weight:900;color:var(--white);line-height:1.15;margin-bottom:12px;}
.xp-row{display:flex;align-items:center;gap:5px;}
.xp-text{color:var(--text-sub);font-size:12px;font-weight:500;}
.ring{width:86px;height:86px;border-radius:50%;border:8px solid rgba(255,255,255,0.08);display:flex;align-items:center;justify-content:center;flex-direction:column;flex-shrink:0;transition:border-color .4s,box-shadow .4s;}
.ring.on{border-color:var(--purple);box-shadow:0 0 16px rgba(59,130,246,0.4);}
.ring.done{border-color:var(--white);box-shadow:0 0 12px rgba(255,255,255,0.2);}
.ring-pct{font-size:18px;font-weight:800;color:var(--white);}
.ring-lbl{font-size:9px;color:var(--text-muted);margin-top:1px;}

/* PERFECT DAY BANNER */
#perf-banner{display:none;margin:0 20px 16px;background:rgba(59,130,246,0.1);border:1px solid rgba(59,130,246,0.3);border-radius:16px;padding:14px 18px;text-align:center;}
#perf-banner.show{animation:fadeInUp .35s ease forwards;}
#perf-banner.hiding{animation:fadeOut .5s ease forwards;}
.perf-txt{font-size:15px;font-weight:700;color:var(--white);}
.perf-sub{font-size:11px;color:var(--text-muted);margin-top:3px;}
@keyframes fadeInUp{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:translateY(0)}}
@keyframes fadeOut{from{opacity:1}to{opacity:0}}

/* CHECK POP ANIMATION */
@keyframes popBounce{0%{transform:scale(1)}40%{transform:scale(1.55)}70%{transform:scale(0.88)}100%{transform:scale(1)}}
.habit-check.popping{animation:popBounce .38s cubic-bezier(.36,.07,.19,.97);}

/* TODAY — HABITS */
.habits-header{display:flex;align-items:center;justify-content:space-between;padding:0 20px;margin-bottom:12px;}
.habits-title{font-size:10px;font-weight:600;color:var(--text-muted);letter-spacing:1.5px;text-transform:uppercase;}
.add-btn{background:rgba(59,130,246,0.2);color:var(--purple-light);border:1px solid rgba(59,130,246,0.3);border-radius:999px;padding:6px 14px;font-size:12px;font-weight:600;cursor:pointer;transition:background .2s,transform .15s;}
.add-btn:active{transform:scale(0.96);background:rgba(59,130,246,0.3);}
.dot-legend{display:flex;gap:14px;padding:0 20px;margin-bottom:12px;}
.legend-item{display:flex;align-items:center;gap:5px;font-size:10px;color:var(--text-muted);}
.tod-section-header{display:flex;align-items:center;gap:8px;padding:12px 0 6px;}
.tod-section-lbl{font-size:10px;font-weight:600;color:var(--text-muted);letter-spacing:2px;text-transform:uppercase;}
.habits-list{padding:0 20px;}
.habit-row{display:flex;align-items:center;gap:12px;background:var(--card);border:1px solid var(--border);border-radius:18px;padding:14px 14px 14px 16px;margin-bottom:8px;transition:background .2s,border-color .2s,transform .15s;}
.habit-row:active{transform:scale(0.99);}
.habit-row.is-done{background:rgba(8,8,13,0.7);border-color:rgba(59,130,246,0.1);}
.habit-emoji{font-size:24px;width:38px;text-align:center;flex-shrink:0;cursor:pointer;}
.habit-icon-badge{width:44px;height:44px;border-radius:13px;background:#0F2044;border:1px solid rgba(59,130,246,0.45);display:flex;align-items:center;justify-content:center;font-size:21px;flex-shrink:0;cursor:pointer;transition:background .2s,border-color .2s;}
.habit-row.is-done .habit-icon-badge{background:#080F22;border-color:rgba(59,130,246,0.15);}
.habit-sub{font-size:11px;color:var(--text-muted);margin-top:2px;}
.focus-count{font-size:42px;font-weight:900;color:var(--white);line-height:1;margin:0 0 2px;}
.focus-total{font-size:22px;color:var(--text-muted);font-weight:700;}
.focus-done-lbl{font-size:11px;color:var(--text-muted);margin-bottom:10px;}
.habit-info{flex:1;min-width:0;cursor:pointer;}
.habit-name{font-size:14px;font-weight:600;color:var(--text);margin-bottom:2px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
.habit-row.is-done .habit-name{text-decoration:line-through;color:var(--text-muted);}
.habit-desc-preview{font-size:11px;color:var(--text-muted);margin-bottom:4px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;opacity:0.8;}
.habit-dots{display:flex;gap:4px;margin-bottom:4px;}
.dot{width:9px;height:9px;border-radius:50%;}
.dot.done{background:var(--purple);}
.dot.missed{background:rgba(255,255,255,0.18);}
.dot.pending{background:rgba(255,255,255,0.12);border:1px solid rgba(255,255,255,0.22);}
.dot.na{background:rgba(255,255,255,0.04);}
.habit-meta{font-size:10px;color:var(--text-muted);}
.habit-check{width:30px;height:30px;border-radius:50%;border:2px solid rgba(255,255,255,0.12);display:flex;align-items:center;justify-content:center;flex-shrink:0;cursor:pointer;font-size:13px;font-weight:800;color:var(--white);transition:all .2s;user-select:none;}
.habit-check.checked{background:var(--purple);border-color:var(--purple);box-shadow:0 0 10px rgba(59,130,246,0.35);}
.habit-del-btn{width:24px;height:24px;background:none;border:none;color:var(--text-muted);font-size:16px;cursor:pointer;display:flex;align-items:center;justify-content:center;border-radius:6px;flex-shrink:0;opacity:0.4;transition:opacity .15s,background .15s;padding:0;line-height:1;}
.habit-del-btn:active{opacity:1;background:rgba(255,255,255,0.06);}

/* HABIT DETAIL MODAL */
.detail-icon-wrap{text-align:center;margin-bottom:18px;}
.detail-big-icon{font-size:56px;margin-bottom:8px;}
.detail-name{font-size:22px;font-weight:900;color:var(--white);margin-bottom:3px;}
.detail-freq{font-size:12px;color:var(--text-muted);}
.detail-desc-box{background:rgba(255,255,255,0.04);border:1px solid var(--border);border-radius:14px;padding:14px 16px;margin-bottom:16px;}
.detail-desc-lbl{font-size:10px;font-weight:700;color:var(--text-muted);letter-spacing:1px;text-transform:uppercase;margin-bottom:8px;}
.detail-desc-txt{font-size:14px;color:var(--text);line-height:1.65;}
.detail-stats{background:rgba(255,255,255,0.04);border:1px solid var(--border);border-radius:14px;padding:14px 16px;margin-bottom:18px;display:flex;gap:0;align-items:center;}
.detail-stat{flex:1;text-align:center;}
.detail-stat-val{font-size:20px;font-weight:800;margin-bottom:2px;}
.detail-stat-lbl{font-size:10px;color:var(--text-muted);}
.detail-divider{width:1px;height:36px;background:var(--border);flex-shrink:0;}
.detail-dots-wrap{display:flex;gap:3px;justify-content:center;margin-bottom:3px;}
.btn-done{width:100%;border:none;border-radius:14px;padding:15px;font-size:16px;font-weight:700;cursor:pointer;margin-bottom:10px;transition:all .2s;}
.btn-done.undone{background:var(--purple);color:var(--white);}
.btn-done.done-state{background:rgba(59,130,246,0.1);border:2px solid var(--purple);color:var(--purple-light);}

/* HISTORY TAB */
.hist-summary{display:flex;gap:10px;padding:0 20px;margin-bottom:20px;}
.hist-sum-card{flex:1;background:var(--card);border:1px solid var(--border);border-radius:16px;padding:14px;text-align:center;}
.hist-sum-val{font-size:20px;font-weight:800;margin-bottom:4px;}
.hist-sum-lbl{font-size:10px;color:var(--text-sub);}
.week-section{background:var(--card);border:1px solid var(--border);border-radius:18px;overflow:hidden;margin:0 20px 20px;}
.day-row{display:flex;align-items:center;padding:11px 14px;border-bottom:1px solid var(--border);gap:10px;}
.day-row:last-child{border-bottom:none;}
.day-row.is-today{background:rgba(59,130,246,0.08);}
.day-lbl{width:34px;font-size:11px;font-weight:700;color:var(--text-sub);flex-shrink:0;}
.day-row.is-today .day-lbl{color:var(--purple-light);}
.day-date-s{width:46px;font-size:10px;color:var(--text-muted);flex-shrink:0;}
.day-icons{flex:1;display:flex;flex-wrap:wrap;gap:2px;align-items:center;}
.day-hi{font-size:14px;}
.day-empty-s{font-size:10px;color:var(--text-muted);}
.day-cnt{font-size:11px;font-weight:700;color:var(--text-sub);flex-shrink:0;}
.day-cnt.perfect{color:var(--white);}
.day-cnt.zero{color:rgba(255,255,255,0.25);}
.habit-hist-card{background:var(--card);border:1px solid var(--border);border-radius:18px;padding:16px;margin-bottom:12px;}
.habit-hist-top{display:flex;align-items:center;gap:10px;margin-bottom:14px;}
.habit-hist-icon{font-size:24px;flex-shrink:0;}
.habit-hist-info{flex:1;min-width:0;}
.habit-hist-name{font-size:14px;font-weight:700;color:var(--text);margin-bottom:2px;}
.habit-hist-meta{font-size:10px;color:var(--text-muted);}
.details-btn{font-size:10px;color:var(--purple-light);cursor:pointer;white-space:nowrap;}
.wbr{display:flex;align-items:center;gap:8px;margin-bottom:6px;}
.wbr:last-child{margin-bottom:0;}
.wbr-lbl{width:22px;font-size:10px;color:var(--text-muted);text-align:right;flex-shrink:0;}
.wbr-track{flex:1;height:8px;background:rgba(255,255,255,0.06);border-radius:999px;overflow:hidden;}
.wbr-fill{height:100%;border-radius:999px;transition:width .3s;}
.wbr-stat{width:26px;font-size:10px;font-weight:700;text-align:right;flex-shrink:0;}

/* HEATMAP */
.heatmap-section{padding:0 20px;margin-bottom:24px;}
.hm-outer{overflow-x:auto;scrollbar-width:none;}
.hm-outer::-webkit-scrollbar{display:none;}
.hm-month-row{display:flex;gap:4px;padding-left:24px;margin-bottom:4px;}
.hm-month-cell{width:22px;font-size:8px;color:var(--text-muted);overflow:visible;white-space:nowrap;}
.hm-grid-row{display:flex;gap:4px;}
.hm-day-col{display:flex;flex-direction:column;gap:4px;width:20px;flex-shrink:0;}
.hm-day-lbl{height:22px;display:flex;align-items:center;font-size:8px;color:var(--text-muted);}
.heatmap{display:flex;gap:4px;}
.hcol{display:flex;flex-direction:column;gap:4px;}
.hcell{width:22px;height:22px;border-radius:4px;background:rgba(255,255,255,0.06);cursor:pointer;flex-shrink:0;}
.hcell:hover{opacity:0.75;}
.hcell.hcell-today{box-shadow:0 0 0 2px var(--white);}
.hcell.hcell-future{background:transparent;cursor:default;pointer-events:none;}
.hm-legend{display:flex;align-items:center;gap:4px;margin-top:8px;justify-content:flex-end;}
.hm-legend-cell{width:12px;height:12px;border-radius:2px;}

/* INSIGHTS */
.insight-scroll{display:flex;gap:12px;overflow-x:auto;padding:0 20px;margin-bottom:24px;scrollbar-width:none;}
.insight-scroll::-webkit-scrollbar{display:none;}
.insight-card{flex-shrink:0;width:148px;background:var(--card);border:1px solid var(--border);border-radius:16px;padding:14px;}
.insight-icon{font-size:18px;margin-bottom:6px;}
.insight-val{font-size:22px;font-weight:800;color:var(--white);margin-bottom:2px;}
.insight-lbl{font-size:10px;color:var(--text-sub);line-height:1.3;}

/* MODAL */
.modal-overlay{position:absolute;inset:0;background:rgba(0,0,0,0.75);display:flex;align-items:flex-end;backdrop-filter:blur(4px);}
.modal-sheet{background:#141428;border-radius:24px 24px 0 0;padding:20px 22px 44px;width:100%;max-height:88vh;overflow-y:auto;animation:slideUp .22s ease;}
.modal-sheet::-webkit-scrollbar{display:none;}
@keyframes slideUp{from{transform:translateY(100%)}to{transform:translateY(0)}}
.modal-handle{width:36px;height:4px;background:rgba(255,255,255,0.18);border-radius:2px;margin:0 auto 20px;}
.modal-title{font-size:20px;font-weight:800;color:var(--white);margin-bottom:16px;}
.emoji-preview{font-size:42px;text-align:center;background:rgba(255,255,255,0.05);border-radius:14px;padding:10px;margin-bottom:12px;}
.emoji-grid{display:grid;grid-template-columns:repeat(6,1fr);gap:7px;margin-bottom:16px;}
.emoji-btn{font-size:21px;background:rgba(255,255,255,0.05);border:2px solid transparent;border-radius:10px;padding:7px 4px;cursor:pointer;transition:all .15s;}
.emoji-btn.sel{border-color:var(--purple);background:var(--purple-glow);}

/* ADD HABIT MODAL — MINIMAL */
.add-name-row{display:flex;align-items:center;gap:10px;margin-bottom:18px;}
.add-emoji-sel{width:48px;height:48px;border-radius:13px;background:#0F2044;border:1px solid rgba(59,130,246,0.3);display:flex;align-items:center;justify-content:center;font-size:23px;flex-shrink:0;}
.add-name-inp{flex:1;background:rgba(255,255,255,0.05);border:1px solid var(--border);border-radius:12px;padding:13px 14px;font-size:15px;color:var(--white);outline:none;transition:border-color .2s;font-family:inherit;}
.add-name-inp:focus{border-color:var(--purple);}
.add-name-inp::placeholder{color:var(--text-muted);}
.add-emoji-grid{display:grid;grid-template-columns:repeat(5,1fr);gap:6px;margin-bottom:20px;}
.add-emoji-btn{font-size:20px;background:rgba(255,255,255,0.04);border:1.5px solid transparent;border-radius:10px;padding:7px 0;cursor:pointer;transition:all .15s;text-align:center;}
.add-emoji-btn.sel{border-color:var(--purple);background:rgba(59,130,246,0.12);}
.add-row{display:flex;align-items:center;justify-content:space-between;padding:13px 0;border-top:1px solid var(--border);}
.add-row-lbl{font-size:12px;color:var(--text-sub);font-weight:500;}
.add-tod{display:flex;gap:5px;}
.add-tod-btn{background:none;border:1px solid var(--border);border-radius:8px;color:var(--text-muted);padding:5px 9px;font-size:11px;cursor:pointer;transition:all .15s;white-space:nowrap;}
.add-tod-btn.sel{border-color:var(--purple);color:var(--purple-light);background:rgba(59,130,246,0.1);}
.add-freq{display:flex;align-items:center;gap:12px;}
.add-freq-btn{width:28px;height:28px;border-radius:50%;background:rgba(255,255,255,0.07);border:1px solid var(--border);color:var(--white);font-size:16px;cursor:pointer;display:flex;align-items:center;justify-content:center;transition:background .15s;line-height:1;}
.add-freq-btn:disabled{opacity:0.2;cursor:default;}
.add-freq-val{font-size:13px;font-weight:600;color:var(--white);min-width:58px;text-align:center;}
/* legacy compat */
.field-lbl{font-size:10px;font-weight:700;color:var(--text-muted);letter-spacing:1px;text-transform:uppercase;margin-bottom:8px;}
.habit-input{width:100%;background:rgba(255,255,255,0.06);border:1px solid var(--border);border-radius:12px;padding:13px 15px;font-size:15px;color:var(--white);margin-bottom:14px;outline:none;transition:border-color .2s;font-family:inherit;}
.habit-input:focus{border-color:var(--purple);}
.habit-input::placeholder{color:var(--text-muted);}
.freq-btn{width:36px;height:36px;border-radius:50%;background:rgba(255,255,255,0.08);border:1px solid var(--border);color:var(--white);font-size:20px;cursor:pointer;display:flex;align-items:center;justify-content:center;flex-shrink:0;transition:background .15s;}
.freq-btn[disabled]{opacity:0.3;cursor:default;}
.btn-primary{width:100%;background:var(--purple);color:var(--white);border:none;border-radius:14px;padding:15px;font-size:16px;font-weight:700;cursor:pointer;margin-bottom:10px;transition:opacity .15s,transform .15s;}
.btn-primary:active{opacity:0.85;transform:scale(0.98);}
.btn-secondary{width:100%;background:transparent;color:var(--text-sub);border:1px solid var(--border);border-radius:14px;padding:13px;font-size:14px;cursor:pointer;margin-bottom:10px;transition:opacity .15s,background .15s;}
.btn-secondary:active{opacity:0.7;}
.btn-danger{width:100%;background:transparent;color:var(--text-sub);border:1px solid var(--border);border-radius:14px;padding:12px;font-size:13px;cursor:pointer;transition:opacity .15s;}
.btn-danger:active{opacity:0.7;}

/* HABIT HISTORY MODAL (calendar view from History tab) */
.hm-header{display:flex;align-items:center;gap:14px;margin-bottom:22px;}
.hm-icon{font-size:38px;}
.hm-name{font-size:18px;font-weight:800;color:var(--white);margin-bottom:3px;}
.hm-sub{font-size:12px;color:var(--text-sub);}
.hm-sec{font-size:10px;font-weight:700;color:var(--text-muted);letter-spacing:1px;text-transform:uppercase;margin-bottom:8px;}
.cal-labels{display:grid;grid-template-columns:repeat(7,1fr);gap:4px;margin-bottom:5px;}
.cal-labels span{font-size:9px;color:var(--text-muted);text-align:center;}
.cal-row{display:grid;grid-template-columns:repeat(7,1fr);gap:4px;margin-bottom:4px;}
.cal-dot{height:28px;border-radius:6px;}
.cal-dot.done{background:var(--purple);}
.cal-dot.missed{background:rgba(255,255,255,0.08);}
.cal-dot.pending{background:rgba(255,255,255,0.06);border:1px dashed rgba(255,255,255,0.18);}
.cal-dot.na{background:rgba(255,255,255,0.03);}
.cal-dot.is-today{outline:2px solid var(--purple);outline-offset:2px;}
.cal-legend{display:flex;gap:14px;margin:10px 0 18px;}
.cal-li{display:flex;align-items:center;gap:5px;font-size:10px;color:var(--text-muted);}
.cal-ld{width:10px;height:10px;border-radius:50%;}
.hm-stats{display:flex;background:var(--card);border:1px solid var(--border);border-radius:14px;margin-bottom:18px;overflow:hidden;}
.hm-stat{flex:1;padding:14px;text-align:center;border-right:1px solid var(--border);}
.hm-stat:last-child{border-right:none;}
.hm-sv{font-size:20px;font-weight:800;margin-bottom:3px;}
.hm-sl{font-size:10px;color:var(--text-sub);}

/* PROGRESS */
.lvl-hero{background:var(--card);border-bottom:1px solid var(--border);padding:24px 20px 18px;text-align:center;}
.lvl-sm{font-size:10px;font-weight:600;color:var(--text-muted);letter-spacing:2px;text-transform:uppercase;margin-bottom:6px;}
.lvl-name{font-size:30px;font-weight:900;color:var(--white);margin-bottom:4px;}
.lvl-num{font-size:12px;color:var(--text-muted);margin-bottom:18px;}
.xp-bar-wrap{background:rgba(255,255,255,0.06);border-radius:999px;height:8px;margin:0 20px 8px;overflow:hidden;}
.xp-bar-fill{height:100%;border-radius:999px;background:linear-gradient(to right,var(--purple),var(--purple-light));}
.xp-label{font-size:12px;color:var(--text-sub);text-align:center;margin-bottom:22px;}
.level-grid{display:grid;grid-template-columns:repeat(5,1fr);gap:8px;padding:0 20px;margin-bottom:24px;}
.lvl-tile{background:var(--card);border:1px solid var(--border);border-radius:12px;padding:11px 5px;text-align:center;}
.lvl-tile.cur{border-color:var(--purple);background:rgba(59,130,246,0.15);box-shadow:0 0 12px rgba(59,130,246,0.3);}
.lvl-tile.past{border-color:rgba(59,130,246,0.4);background:rgba(59,130,246,0.06);}
.lvl-tile.lock{opacity:0.4;}
.tile-icon{font-size:18px;margin-bottom:3px;}
.tile-name{font-size:9px;color:var(--text-sub);font-weight:600;}
.tile-num{font-size:10px;color:var(--text-muted);}

/* PROGRESS — RANK HERO & ANIMATIONS */
@keyframes rankFloat{0%,100%{transform:translateY(0)}50%{transform:translateY(-7px)}}
@keyframes rankGlow{0%,100%{filter:drop-shadow(0 0 18px var(--purple))}50%{filter:drop-shadow(0 0 40px #93C5FD)}}
@keyframes burst{from{opacity:0;transform:scale(0.85)}to{opacity:1;transform:scale(1)}}
@keyframes lvlPulse{0%,100%{box-shadow:0 0 24px rgba(59,130,246,0.5)}50%{box-shadow:0 0 40px rgba(59,130,246,0.9)}}
@keyframes luPop{0%{transform:scale(0)}40%{transform:scale(1.15)}70%{transform:scale(0.92)}100%{transform:scale(1)}}
.rank-icon{font-size:82px;display:inline-block;animation:rankFloat 3s ease-in-out infinite,rankGlow 2.5s ease-in-out infinite;}
.rank-grad{background:linear-gradient(135deg,var(--white),var(--purple-light));-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;}
.prog-hero{background:var(--card);border-bottom:1px solid var(--border);padding:32px 20px 24px;text-align:center;position:relative;overflow:hidden;}
.prog-hero::before{content:'';position:absolute;inset:0;background:radial-gradient(ellipse at 50% 0%,rgba(59,130,246,0.18) 0%,transparent 65%);pointer-events:none;}
.xp-bar-wrap2{background:rgba(255,255,255,0.08);border-radius:999px;height:10px;margin:0 20px 6px;overflow:hidden;box-shadow:inset 0 0 0 1px rgba(255,255,255,0.06);}
#xp-bar-fill{height:100%;border-radius:999px;background:linear-gradient(to right,var(--purple),var(--purple-light));transition:width 1.2s cubic-bezier(0.4,0,0.2,1);width:0;}
/* MILESTONE BADGES */
.milestone-scroll{display:flex;gap:10px;padding:0 20px;margin-bottom:24px;overflow-x:auto;scrollbar-width:none;}
.milestone-scroll::-webkit-scrollbar{display:none;}
.milestone-card{flex-shrink:0;width:100px;border-radius:18px;padding:14px 8px;text-align:center;border:1px solid var(--border);background:var(--card);transition:transform .15s;}
.milestone-card:active{transform:scale(0.96);}
.milestone-card.earned{border-color:rgba(59,130,246,0.4);background:rgba(59,130,246,0.08);}
.milestone-card.locked{opacity:0.28;}
.milestone-icon{font-size:28px;margin-bottom:6px;}
.milestone-title{font-size:11px;font-weight:700;color:var(--white);margin-bottom:2px;}
.milestone-days{font-size:10px;color:var(--text-muted);}
.milestone-check{font-size:10px;color:var(--purple-light);font-weight:600;margin-top:4px;}
/* LEVEL JOURNEY */
.journey-wrap{padding:0 20px;margin-bottom:28px;}
.journey-scroll{display:flex;gap:8px;overflow-x:auto;scrollbar-width:none;padding-bottom:6px;}
.journey-scroll::-webkit-scrollbar{display:none;}
.journey-card{flex-shrink:0;border-radius:16px;padding:12px 6px;text-align:center;border:2px solid var(--border);background:var(--card);position:relative;}
.journey-card.past{width:62px;border-color:rgba(59,130,246,0.35);background:rgba(59,130,246,0.05);}
.journey-card.cur{width:90px;border-color:var(--purple);background:rgba(59,130,246,0.18);animation:lvlPulse 2.2s ease-in-out infinite;}
.journey-card.future{width:60px;opacity:0.25;}
.journey-icon{font-size:26px;margin-bottom:5px;}
.journey-card.cur .journey-icon{font-size:36px;}
.journey-name{font-size:9px;font-weight:700;color:var(--text-sub);}
.journey-card.cur .journey-name{font-size:11px;color:var(--white);}
.journey-lv{font-size:9px;color:var(--text-muted);margin-top:1px;}
.journey-check{position:absolute;top:4px;right:6px;font-size:10px;color:var(--purple-light);}
/* LEVEL-UP FULL SCREEN */
.lu-page{position:absolute;inset:0;background:var(--bg);display:flex;flex-direction:column;align-items:center;justify-content:center;overflow:hidden;animation:luPageIn .4s cubic-bezier(0.22,1,0.36,1) forwards;}
@keyframes luPageIn{from{opacity:0;transform:scale(0.97)}to{opacity:1;transform:scale(1)}}
.lu-bg-glow{position:absolute;top:-60px;left:50%;transform:translateX(-50%);width:340px;height:340px;border-radius:50%;background:radial-gradient(circle,rgba(59,130,246,0.35) 0%,transparent 70%);pointer-events:none;animation:luGlowPulse 2.5s ease-in-out infinite;}
@keyframes luGlowPulse{0%,100%{opacity:0.6;transform:translateX(-50%) scale(1)}50%{opacity:1;transform:translateX(-50%) scale(1.15)}}
.lu-particles{position:absolute;inset:0;pointer-events:none;overflow:hidden;}
.lu-particle{position:absolute;border-radius:50%;animation:luRise linear infinite;}
@keyframes luRise{0%{transform:translateY(0) scale(1);opacity:0.9}80%{opacity:0.5}100%{transform:translateY(-100vh) scale(0.2);opacity:0}}
.lu-content{position:relative;z-index:1;display:flex;flex-direction:column;align-items:center;text-align:center;padding:0 32px;width:100%;}
.lu-eyebrow{font-size:11px;font-weight:700;color:var(--purple-light);letter-spacing:4px;text-transform:uppercase;margin-bottom:24px;animation:luFadeUp .5s .05s both;}
.lu-badge-wrap{width:164px;height:164px;margin:0 auto 24px;filter:drop-shadow(0 0 36px rgba(59,130,246,0.85));animation:rankFloat 3s ease-in-out infinite,luFadeUp .6s .1s both;}
.lu-rank-name{font-size:46px;font-weight:900;margin-bottom:6px;background:linear-gradient(135deg,var(--white),var(--purple-light));-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;animation:luFadeUp .5s .2s both;}
.lu-level-num{font-size:13px;color:var(--text-muted);letter-spacing:2px;text-transform:uppercase;margin-bottom:36px;animation:luFadeUp .5s .25s both;}
.lu-xp-section{width:100%;animation:luFadeUp .5s .32s both;}
.lu-xp-bar-bg{background:rgba(255,255,255,0.07);border-radius:999px;height:5px;margin-bottom:8px;overflow:hidden;}
.lu-xp-bar-fill{height:100%;border-radius:999px;background:linear-gradient(to right,var(--purple),var(--purple-light));width:0;transition:width 1.3s .5s cubic-bezier(0.4,0,0.2,1);}
.lu-xp-label{font-size:11px;color:var(--text-muted);margin-bottom:40px;}
.lu-continue-btn{width:100%;background:var(--purple);color:var(--white);border:none;border-radius:16px;padding:16px;font-size:16px;font-weight:700;cursor:pointer;animation:luFadeUp .5s .4s both;transition:opacity .15s,transform .15s;}
.lu-continue-btn:active{opacity:0.85;transform:scale(0.98);}
@keyframes luFadeUp{from{opacity:0;transform:translateY(22px)}to{opacity:1;transform:translateY(0)}}
/* legacy compat */
.lu-overlay{display:none;}.lu-inner{display:none;}.lu-icon{display:none;}.lu-sub{display:none;}.lu-xp-wrap{display:none;}.lu-xp-fill{display:none;}.lu-btn{display:none;}.lu-title{display:none;}.lu-label{display:none;}

/* TOOLKIT */
.tool-grid{display:grid;grid-template-columns:repeat(2,1fr);gap:12px;padding:0 20px;margin-bottom:24px;}
.tool-card{background:var(--card);border:1px solid var(--border);border-radius:20px;padding:18px 15px;cursor:pointer;transition:transform .15s;}
.tool-card:active{transform:scale(0.97);}
.tool-icon{font-size:26px;margin-bottom:9px;}
.tool-name{font-size:13px;font-weight:700;color:var(--text);margin-bottom:3px;}
.tool-desc{font-size:11px;color:var(--text-sub);}
.tool-badge{display:inline-block;margin-top:7px;padding:3px 8px;border-radius:999px;font-size:10px;font-weight:700;}
.chal-scroll{display:flex;gap:12px;padding:0 20px;margin-bottom:20px;overflow-x:auto;scrollbar-width:none;}
.chal-scroll::-webkit-scrollbar{display:none;}
.chal-card{flex-shrink:0;width:175px;background:var(--card);border:1px solid var(--border);border-radius:16px;padding:15px;}
.chal-icon{font-size:22px;margin-bottom:7px;}
.chal-name{font-size:13px;font-weight:700;color:var(--text);margin-bottom:3px;}
.chal-desc{font-size:11px;color:var(--text-sub);}

/* PROFILE */
.prof-hero{background:var(--card);border-bottom:1px solid var(--border);padding:28px 20px;text-align:center;margin-bottom:16px;}
.avatar{width:72px;height:72px;border-radius:36px;background:rgba(59,130,246,0.25);border:1px solid rgba(59,130,246,0.35);display:flex;align-items:center;justify-content:center;font-size:28px;font-weight:900;color:var(--white);margin:0 auto 12px;}
.prof-name{font-size:22px;font-weight:800;color:var(--white);margin-bottom:4px;}
.prof-rank{font-size:12px;color:var(--text-muted);font-weight:500;margin-bottom:4px;}
.prof-since{font-size:11px;color:var(--text-muted);}
.areas-card{background:var(--card);border:1px solid var(--border);border-radius:18px;padding:18px;margin:0 20px 24px;}
.area-row{display:flex;align-items:center;gap:12px;margin-bottom:14px;}
.area-row:last-child{margin-bottom:0;}
.area-lbl{width:88px;font-size:12px;color:var(--text-sub);flex-shrink:0;}
.area-bar-bg{flex:1;height:6px;background:rgba(255,255,255,0.06);border-radius:999px;overflow:hidden;}
.area-bar-fill{height:6px;border-radius:999px;}
.area-pct{width:32px;font-size:12px;font-weight:700;text-align:right;flex-shrink:0;}
.settings-card{background:var(--card);border:1px solid var(--border);border-radius:18px;margin:0 20px;overflow:hidden;}
.habit-perf-row{display:flex;align-items:center;gap:13px;padding:13px 15px;border-bottom:1px solid var(--border);cursor:pointer;transition:background .15s;}
.habit-perf-row:last-child{border-bottom:none;}
.habit-perf-row:hover{background:rgba(255,255,255,0.03);}
.setting-row{display:flex;align-items:center;padding:14px 16px;border-bottom:1px solid var(--border);cursor:pointer;transition:background .15s,transform .15s;}
.setting-row:last-child{border-bottom:none;}
.setting-row:active{background:rgba(255,255,255,0.03);transform:scale(0.99);}
.setting-icon{font-size:16px;margin-right:13px;opacity:0.7;}
.setting-lbl{flex:1;font-size:13px;color:var(--text);font-weight:400;}
.setting-val{font-size:12px;color:var(--text-muted);margin-right:7px;}
.setting-chev{font-size:16px;color:var(--text-muted);opacity:0.5;}
/* LEVEL BADGE GRID */
.lvl-grid{display:grid;grid-template-columns:repeat(2,1fr);gap:14px;padding:0 20px;margin-bottom:28px;}
.lvl-badge-card{border-radius:20px;padding:22px 12px 16px;text-align:center;border:2px solid var(--border);background:var(--card);position:relative;}
.lvl-badge-card.achieved{border-color:rgba(59,130,246,0.3);background:rgba(59,130,246,0.06);}
.lvl-badge-card.current{border-color:var(--purple);background:rgba(59,130,246,0.14);animation:lvlPulse 2.2s ease-in-out infinite;}
.lvl-badge-card.locked{opacity:0.22;filter:grayscale(0.9);}
.badge-icon{width:68px;height:68px;margin:0 auto 12px;}
.badge-icon svg{width:100%;height:100%;}
.badge-name{font-size:14px;font-weight:800;color:var(--white);margin-bottom:3px;}
.lvl-badge-card.locked .badge-name{color:var(--text-muted);}
.badge-lv{font-size:11px;color:var(--text-sub);}
.badge-check{position:absolute;top:10px;right:13px;font-size:11px;color:var(--purple-light);font-weight:700;}

/* ── LANDING ── */
.landing-wrap{display:flex;flex-direction:column;align-items:center;justify-content:center;height:100%;padding:0 32px;text-align:center;}
.landing-logo{width:80px;height:80px;margin-bottom:24px;filter:drop-shadow(0 0 28px rgba(59,130,246,0.65));animation:luFadeUp .5s .05s both;}
.landing-title{font-size:28px;font-weight:900;letter-spacing:4px;color:var(--white);margin-bottom:10px;animation:luFadeUp .5s .1s both;}
.landing-tagline{font-size:15px;color:var(--text-muted);line-height:1.5;max-width:220px;margin-bottom:44px;animation:luFadeUp .5s .15s both;}
.landing-cta{width:100%;max-width:280px;background:var(--purple);color:var(--white);border:none;border-radius:14px;padding:15px;font-size:16px;font-weight:700;cursor:pointer;margin-bottom:14px;animation:luFadeUp .5s .2s both;transition:opacity .15s,transform .15s;}
.landing-cta:active{opacity:.85;transform:scale(.98);}
.landing-link{font-size:13px;color:var(--text-muted);background:none;border:none;cursor:pointer;animation:luFadeUp .5s .25s both;padding:6px;text-decoration:underline;}
/* ── ONBOARD ── */
.ob-page{display:flex;flex-direction:column;padding:28px 22px 40px;height:100%;box-sizing:border-box;}
.ob-back{background:none;border:none;color:var(--text-muted);font-size:20px;cursor:pointer;padding:0;margin-bottom:24px;text-align:left;width:fit-content;}
.ob-progress{display:flex;gap:6px;margin-bottom:28px;}
.ob-dot{flex:1;height:3px;border-radius:999px;background:var(--border);transition:background .3s;}
.ob-dot.active{background:var(--purple);}
.ob-title{font-size:22px;font-weight:800;color:var(--white);margin-bottom:6px;}
.ob-sub{font-size:13px;color:var(--text-muted);margin-bottom:28px;}
.ob-goal-grid{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:0;}
.ob-goal-btn{background:var(--card);border:1.5px solid var(--border);border-radius:16px;padding:16px 12px;text-align:center;cursor:pointer;transition:border-color .2s,background .2s;}
.ob-goal-btn.sel{border-color:var(--purple);background:rgba(59,130,246,0.1);}
.ob-goal-icon{font-size:26px;margin-bottom:8px;}
.ob-goal-lbl{font-size:12px;font-weight:600;color:var(--text);}
.ob-time-opt{display:flex;align-items:center;gap:14px;background:var(--card);border:1.5px solid var(--border);border-radius:16px;padding:16px;margin-bottom:10px;cursor:pointer;transition:border-color .2s,background .2s;}
.ob-time-opt.sel{border-color:var(--purple);background:rgba(59,130,246,0.1);}
.ob-time-icon{font-size:24px;}
.ob-time-lbl{font-size:14px;font-weight:600;color:var(--text);}
.ob-time-sub{font-size:11px;color:var(--text-muted);margin-top:2px;}
.ob-habit-row{display:flex;align-items:center;gap:12px;padding:13px 0;border-bottom:1px solid var(--border);cursor:pointer;}
.ob-check{width:22px;height:22px;border-radius:50%;border:2px solid var(--border);flex-shrink:0;display:flex;align-items:center;justify-content:center;font-size:11px;font-weight:700;color:var(--white);transition:all .2s;}
.ob-check.on{background:var(--purple);border-color:var(--purple);}
.ob-email-inp{width:100%;background:rgba(255,255,255,0.05);border:1px solid var(--border);border-radius:12px;padding:15px 16px;font-size:16px;color:var(--white);outline:none;font-family:inherit;transition:border-color .2s;margin-bottom:20px;box-sizing:border-box;}
.ob-email-inp:focus{border-color:var(--purple);}
.ob-email-inp::placeholder{color:var(--text-muted);}
.ob-continue{width:100%;background:var(--purple);color:var(--white);border:none;border-radius:14px;padding:15px;font-size:16px;font-weight:700;cursor:pointer;margin-top:auto;transition:opacity .15s;}
.ob-continue:disabled{opacity:.35;cursor:default;}

/* HABIT PERFORMANCE RANKING */
.perf-list{padding:0 20px;margin-bottom:24px;}
.perf-row{display:flex;align-items:center;gap:10px;padding:12px 14px;background:var(--card);border:1px solid var(--border);border-radius:14px;margin-bottom:7px;}
.perf-rank{width:18px;font-size:11px;color:var(--text-muted);font-weight:700;text-align:center;flex-shrink:0;}
.perf-icon{font-size:20px;flex-shrink:0;}
.perf-name{flex:1;font-size:13px;font-weight:600;color:var(--text);min-width:0;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;}
.perf-pct{font-size:13px;font-weight:800;color:var(--white);margin-right:2px;flex-shrink:0;}
.perf-trend{font-size:10px;font-weight:700;flex-shrink:0;width:42px;text-align:right;}
.perf-trend.up{color:#2DD4A0;}
.perf-trend.dn{color:#FF6070;}
.perf-trend.fl{color:var(--text-muted);}
/* NEEDS ATTENTION + FIRE STREAK */
.ana-pair{display:flex;gap:10px;padding:0 20px;margin-bottom:24px;}
.ana-card{flex:1;background:var(--card);border:1px solid var(--border);border-radius:18px;padding:14px 12px;}
.ana-card-ttl{font-size:9px;font-weight:700;color:var(--text-muted);letter-spacing:1.5px;text-transform:uppercase;margin-bottom:12px;}
.weak-row{display:flex;align-items:center;gap:7px;margin-bottom:8px;}
.weak-row:last-child{margin-bottom:0;}
.weak-dot{width:5px;height:5px;border-radius:50%;background:#FF6070;flex-shrink:0;}
.weak-name{flex:1;font-size:11px;color:var(--text);white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
.weak-skips{font-size:10px;color:#FF6070;font-weight:700;flex-shrink:0;}
.fire-big{font-size:32px;text-align:center;margin-bottom:4px;}
.fire-num{font-size:26px;font-weight:900;color:var(--white);text-align:center;line-height:1;}
.fire-lbl{font-size:9px;color:var(--text-muted);text-align:center;margin-top:2px;margin-bottom:8px;letter-spacing:1px;text-transform:uppercase;}
.fire-msg{font-size:10px;color:var(--text-sub);text-align:center;line-height:1.45;font-style:italic;}
/* RADAR CHART */
.radar-wrap{padding:0 20px;margin-bottom:24px;}
.radar-card{background:var(--card);border:1px solid var(--border);border-radius:18px;padding:18px;display:flex;justify-content:center;}
.radar-svg{width:190px;height:190px;}
/* TOP BAR */
#topbar-el{display:flex;align-items:center;justify-content:space-between;padding:0 18px;height:50px;border-bottom:1px solid var(--border);flex-shrink:0;background:var(--bg);}
.tb-avatar{width:30px;height:30px;border-radius:50%;background:linear-gradient(135deg,#1E40AF,#3B82F6);display:flex;align-items:center;justify-content:center;font-size:12px;font-weight:800;color:#fff;cursor:pointer;flex-shrink:0;letter-spacing:0;}
.tb-stats{display:flex;align-items:center;gap:0;}
.tb-stat{display:flex;align-items:center;gap:4px;padding:6px 12px;cursor:pointer;border-radius:10px;transition:background .15s;}
.tb-stat:active{background:rgba(255,255,255,.05);}
.tb-stat-icon{font-size:14px;line-height:1;}
.tb-stat-val{font-size:13px;font-weight:700;color:var(--white);}
.tb-divider{width:1px;height:16px;background:var(--border);}
/* STREAK CALENDAR */
.sc-wrap{padding:0 20px 0;margin-bottom:24px;}
.sc-card{background:var(--card);border:1px solid var(--border);border-radius:18px;padding:16px 14px 18px;}
.sc-head{display:flex;align-items:center;justify-content:space-between;margin-bottom:14px;}
.sc-month{font-size:13px;font-weight:700;color:var(--white);}
.sc-streak-pill{display:flex;align-items:center;gap:5px;font-size:11px;font-weight:700;color:var(--purple-light);}
.sc-dow{display:grid;grid-template-columns:repeat(7,1fr);margin-bottom:6px;}
.sc-dow span{text-align:center;font-size:9px;font-weight:600;color:var(--text-muted);letter-spacing:.3px;padding:2px 0;}
.sc-grid{display:grid;grid-template-columns:repeat(7,1fr);gap:3px;}
.sc-cell{aspect-ratio:1;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:10px;font-weight:600;}
.sc-cell.s-hit{background:var(--purple);color:#fff;}
.sc-cell.s-part{background:rgba(59,130,246,.15);color:var(--purple-light);border:1px solid rgba(59,130,246,.3);}
.sc-cell.s-miss{color:rgba(255,255,255,.18);}
.sc-cell.s-now{background:rgba(59,130,246,.12);color:var(--purple-light);border:1px solid rgba(59,130,246,.35);}
.sc-cell.s-future{color:rgba(255,255,255,.12);}
/* PERFECT DAY ANIMATION */
@keyframes pdFadeIn{from{opacity:0;}to{opacity:1;}}
@keyframes pdFadeOut{to{opacity:0;transform:scale(.97);}}
@keyframes pdRing{0%{transform:scale(0);opacity:0;}55%{transform:scale(1.1);}75%{transform:scale(.96);}100%{transform:scale(1);opacity:1;}}
@keyframes pdCheck{from{stroke-dashoffset:56;}to{stroke-dashoffset:0;}}
@keyframes pdTxt{from{opacity:0;transform:translateY(10px);}to{opacity:1;transform:translateY(0);}}
.pd-overlay{position:fixed;inset:0;background:rgba(1,2,12,.96);display:flex;flex-direction:column;align-items:center;justify-content:center;z-index:400;gap:14px;animation:pdFadeIn .18s both;}
.pd-ring{width:86px;height:86px;border-radius:50%;background:var(--purple);display:flex;align-items:center;justify-content:center;animation:pdRing .5s cubic-bezier(.34,1.56,.64,1) both;}
.pd-ring svg{width:46px;height:46px;}
.pd-ring svg path{stroke-dasharray:56;stroke-dashoffset:56;animation:pdCheck .4s .3s ease forwards;}
.pd-title{font-size:17px;font-weight:800;color:var(--white);letter-spacing:.3px;animation:pdTxt .3s .35s both;}
.pd-sub{font-size:12px;color:rgba(148,163,184,.55);animation:pdTxt .3s .45s both;}
.pd-out{animation:pdFadeOut .28s forwards;}
/* STREAK CELEBRATION */
@keyframes sFlicker{0%,100%{transform:scaleX(1) scaleY(1);}35%{transform:scaleX(.93) scaleY(1.04);}70%{transform:scaleX(1.04) scaleY(.96);}}
@keyframes sGlow{0%,100%{filter:drop-shadow(0 0 8px rgba(59,130,246,.55));}50%{filter:drop-shadow(0 0 18px rgba(59,130,246,.9));}}
@keyframes sNumGlow{0%,100%{text-shadow:0 0 20px rgba(59,130,246,.7);}50%{text-shadow:0 0 40px rgba(59,130,246,1),0 0 70px rgba(59,130,246,.35);}}
@keyframes sPop{0%{transform:scale(0);opacity:0;}55%{transform:scale(1.14);}75%{transform:scale(.94);}100%{transform:scale(1);opacity:1;}}
@keyframes sSlide{from{opacity:0;transform:translateY(22px);}to{opacity:1;transform:translateY(0);}}
@keyframes sFadeIn{from{opacity:0;}to{opacity:1;}}
@keyframes sEmber{0%{transform:translateY(0) translateX(0);opacity:.85;}100%{transform:translateY(-80px) translateX(var(--ex,0px));opacity:0;}}
.streak-page{position:fixed;inset:0;background:#01020C;display:flex;flex-direction:column;align-items:center;justify-content:center;z-index:300;overflow:hidden;padding:0 36px 60px;animation:sFadeIn .22s both;}
.streak-bg-glow{position:absolute;top:44%;left:50%;transform:translate(-50%,-50%);width:260px;height:260px;border-radius:50%;background:radial-gradient(circle,rgba(37,99,235,.14) 0%,transparent 70%);pointer-events:none;}
.streak-embers{position:absolute;inset:0;pointer-events:none;overflow:hidden;}
.streak-pop-wrap{animation:sPop .55s cubic-bezier(.34,1.56,.64,1) both;}
.streak-row{display:flex;align-items:center;gap:12px;margin-bottom:12px;}
.streak-flame-sm{width:40px;height:50px;flex-shrink:0;animation:sFlicker 2.2s ease-in-out infinite,sGlow 2.2s ease-in-out infinite;}
.streak-num{font-size:72px;font-weight:900;color:#fff;line-height:1;letter-spacing:-3px;animation:sNumGlow 2.2s ease-in-out infinite;}
.streak-lbl{font-size:9px;font-weight:700;letter-spacing:5px;text-transform:uppercase;color:rgba(96,165,250,.55);text-align:center;margin-bottom:28px;}
.streak-msg{font-size:13px;color:rgba(180,205,255,.6);text-align:center;max-width:190px;line-height:1.7;margin-bottom:38px;}
.streak-btn{width:100%;max-width:280px;background:#1D4ED8;color:#fff;border:none;border-radius:12px;padding:15px;font-size:14px;font-weight:700;cursor:pointer;letter-spacing:.3px;transition:opacity .15s;}
.streak-btn:active{opacity:.8;}
.streak-ember{position:absolute;width:2px;height:2px;border-radius:50%;background:#3B82F6;}

/* ── LIGHT MODE ─────────────────────────────────────────────────── */
:root.light{
  --bg:#F0F4FF;--card:#FFFFFF;--border:#DDE4F2;

  --green:#16A34A;--red:#DC2626;
}
/* Structural */
:root.light body{background:#F0F4FF;}
/* Habit rows */
:root.light .habit-icon-badge{background:#DBEAFE;border-color:rgba(37,99,235,0.28);}
:root.light .habit-row.is-done .habit-icon-badge{background:#EFF6FF;border-color:rgba(37,99,235,0.12);}
:root.light .habit-check{border-color:rgba(0,0,0,0.18);}
:root.light .habit-del-btn:active{background:rgba(0,0,0,0.06);}
/* Inputs & modals */
:root.light .add-name-inp,:root.light .ob-email-inp,:root.light .habit-input{background:rgba(0,0,0,0.05);color:var(--white);}
:root.light .add-emoji-sel{background:#DBEAFE;border-color:rgba(37,99,235,0.28);}
:root.light .add-emoji-btn{background:rgba(0,0,0,0.05);}
:root.light .add-freq-btn{background:rgba(0,0,0,0.06);color:var(--white);}
:root.light .btn-secondary{background:rgba(0,0,0,0.04);}
:root.light .btn-danger{color:#DC2626;}
:root.light .modal-overlay{background:rgba(0,0,0,0.45);}
/* Status dots */
:root.light .dot.missed{background:rgba(0,0,0,0.14);}
:root.light .dot.pending{background:rgba(0,0,0,0.06);border-color:rgba(0,0,0,0.16);}
:root.light .dot.na{background:rgba(0,0,0,0.04);}
/* Calendar modal */
:root.light .cal-dot.missed{background:rgba(0,0,0,0.09);}
:root.light .cal-dot.pending{background:rgba(0,0,0,0.05);border-color:rgba(0,0,0,0.14);}
:root.light .cal-dot.na{background:rgba(0,0,0,0.03);}
/* XP / progress bars */
:root.light .xp-bar-wrap2,:root.light .xp-bar-wrap{background:rgba(0,0,0,0.08);}
:root.light .area-bar-bg{background:rgba(0,0,0,0.07);}
/* Detail boxes */
:root.light .detail-desc-box,:root.light .detail-stats{background:rgba(0,0,0,0.03);}
/* Heatmap cells */
:root.light .hcell{background:rgba(0,0,0,0.05);}
:root.light .hcell.hcell-today{box-shadow:0 0 0 2px var(--purple);}
/* Streak calendar */
:root.light .sc-cell.s-miss{color:rgba(0,0,0,0.22);}
:root.light .sc-cell.s-future{color:rgba(0,0,0,0.18);}
/* History */
:root.light .day-cnt.zero{color:rgba(0,0,0,0.2);}
/* Topbar */
:root.light .tb-stat:active{background:rgba(0,0,0,0.06);}
/* Progress hero */
:root.light .prog-hero::before{background:radial-gradient(ellipse at 50% 0%,rgba(37,99,235,0.1) 0%,transparent 65%);}
:root.light .rank-grad{background:linear-gradient(135deg,#1E40AF,#2563EB);-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;}
:root.light .lvl-badge-card{background:rgba(0,0,0,0.03);}
:root.light .lvl-badge-card.current{background:rgba(37,99,235,0.08);}
/* Onboarding */
:root.light .ob-check{border-color:rgba(0,0,0,0.2);color:transparent;}
:root.light .ob-check.on{color:#fff;}
/* Social buttons — Apple stays dark by brand */
:root.light .social-apple{background:#111;color:#fff;}
:root.light .social-google{border:1px solid #E0E6F0;}
/* Theme toggle button */
.tb-theme-btn{background:none;border:none;font-size:15px;cursor:pointer;padding:6px 8px;border-radius:8px;transition:background .15s;flex-shrink:0;line-height:1;margin-left:4px;}
.tb-theme-btn:active{background:rgba(255,255,255,.07);}
:root.light .tb-theme-btn:active{background:rgba(0,0,0,.06);}

.social-btn{width:100%;display:flex;align-items:center;justify-content:center;gap:10px;border:none;border-radius:14px;padding:15px 18px;font-size:14px;font-weight:600;cursor:pointer;font-family:inherit;transition:opacity .15s,transform .1s;letter-spacing:.1px;}

// ── Habit Logic ───────────────────────────────────────────────────
function habitStatus(hid,dateStr){
  const h=S.habits.find(x=>x.id===hid);
  const T=today();
  if(!h||dateStr>T||dateStr<h.createdAt)return'na';
  if((S.completions[hid]||{})[dateStr]===true)return'done';
  if(dateStr<T)return'missed';
  return'pending';
}
function streak(hid){
  const comp=S.completions[hid]||{};
  const h=S.habits.find(x=>x.id===hid);
  if(!h)return 0;
  let n=0;const d=new Date();
  if(!comp[today()])d.setDate(d.getDate()-1);
  while(true){const s=ds(d);if(s<h.createdAt)break;if(comp[s]!==true)break;n++;d.setDate(d.getDate()-1);}
  return n;
}
function freqLabel(n){
  if(!n||n>=7)return'Every day';
  if(n===1)return'1× / week';
  return n+'× / week';
}
function thisWeekStats(){
  const T=today();
  const days=getWeekDays(0).filter(d=>d<=T);
  let done=0,possible=0;
  days.forEach(d=>S.habits.forEach(h=>{if(h.createdAt<=d){possible++;if((S.completions[h.id]||{})[d]===true)done++;}}));
  return{done,possible,pct:possible?Math.round(done/possible*100):0};
}
function totalLogged(){
  return Object.values(S.completions).reduce((sum,c)=>sum+Object.values(c).filter(v=>v===true).length,0);
}

// ── Insights ──────────────────────────────────────────────────────
function getInsights(){
  const longestStreak=S.habits.length>0?S.habits.reduce((m,h)=>Math.max(m,streak(h.id)),0):0;
  const dayTotals=Array(7).fill(0),dayCounts=Array(7).fill(0);
  for(let i=1;i<=84;i++){
    const d=daysAgo(i);
    const dow=new Date(d+'T12:00').getDay();
    const active=S.habits.filter(h=>h.createdAt<=d);
    if(!active.length)continue;
    const done=active.filter(h=>(S.completions[h.id]||{})[d]===true).length;
    dayTotals[dow]+=done/active.length;dayCounts[dow]++;
  }
  const dayAvgs=dayTotals.map((t,i)=>dayCounts[i]>0?t/dayCounts[i]:0);
  const bestDow=dayAvgs.indexOf(Math.max(...dayAvgs));
  const bestDayPct=Math.round(dayAvgs[bestDow]*100);
  const now=new Date(),T=today();
  const lmFirst=new Date(now.getFullYear(),now.getMonth()-1,1);
  const lmLast=new Date(now.getFullYear(),now.getMonth(),0);
  const lmLastStr=ds(lmLast);
  let thisTotal=0,thisPossible=0,lastTotal=0,lastPossible=0;
  S.habits.forEach(h=>{
    const comp=S.completions[h.id]||{};
    for(let d=new Date(now.getFullYear(),now.getMonth(),1);;d.setDate(d.getDate()+1)){
      const dstr=ds(d);if(dstr>T)break;
      if(dstr>=h.createdAt){thisPossible++;if(comp[dstr]===true)thisTotal++;}
    }
    for(let d=new Date(lmFirst);;d.setDate(d.getDate()+1)){
      const dstr=ds(d);if(dstr>lmLastStr)break;
      if(dstr>=h.createdAt){lastPossible++;if(comp[dstr]===true)lastTotal++;}
    }
  });
  const thisRate=thisPossible?Math.round(thisTotal/thisPossible*100):0;
  const lastRate=lastPossible?Math.round(lastTotal/lastPossible*100):0;
  return{longestStreak,bestDay:DOW_NAMES[bestDow],bestDayPct,diff:thisRate-lastRate,thisRate,lastRate};
}

// ── XP / Level Engine ─────────────────────────────────────────────
function computeXP(){
  let xp=totalLogged()*10;
  for(let i=0;i<=90;i++){
    const d=daysAgo(i);
    const active=S.habits.filter(h=>h.createdAt<=d);
    if(!active.length)continue;
    if(active.every(h=>(S.completions[h.id]||{})[d]===true))xp+=50;
  }
  Object.entries(S.challenges).forEach(([cid,data])=>{
    const ch=CHALLENGES.find(c=>c.id===cid);
    if(!ch||!data)return;
    const days=Object.values(data.completions||{}).filter(Boolean).length;
    xp+=days*ch.xpPerDay;
    if(data.status==='completed')xp+=ch.xpBonus;
  });
  return xp;
}
function levelFromXP(xp){
  let lv=1;
  for(let i=0;i<LEVEL_THRESHOLDS.length;i++){if(xp>=LEVEL_THRESHOLDS[i])lv=i+1;}
  return Math.min(lv,10);
}
function countPerfectDays(){
  let n=0;
  for(let i=0;i<=90;i++){
    const d=daysAgo(i);
    const active=S.habits.filter(h=>h.createdAt<=d);
    if(!active.length)continue;
    if(active.every(h=>(S.completions[h.id]||{})[d]===true))n++;
  }
  return n;
}
function daysActive(){
  if(!S.habits.length)return 0;
  const earliest=S.habits.reduce((m,h)=>h.createdAt<m?h.createdAt:m,S.habits[0].createdAt);
  return Math.max(0,Math.floor((Date.now()-new Date(earliest+'T12:00').getTime())/(86400000)));
}
function bestStreakEver(){
  return S.habits.length>0?S.habits.reduce((m,h)=>Math.max(m,streak(h.id)),0):0;
}
function fmtXP(n){return n>=1000?(n/1000).toFixed(1).replace('.0','')+'k':String(n);}
function habitRate(hid){
  const h=S.habits.find(x=>x.id===hid);
  if(!h)return 0;
  const comp=S.completions[hid]||{};
  const days=Math.min(30,Math.max(1,Math.floor((Date.now()-new Date(h.createdAt+'T12:00').getTime())/86400000)));
  let done=0;
  for(let i=1;i<=days;i++){const d=daysAgo(i);if(comp[d])done++;}
  return Math.round(done/days*100);
}

// ── Music & Sound ────────────────────────────────────────────────
let _ac=null;
function _ctx(){
  if(!_ac)_ac=new(window.AudioContext||window.webkitAudioContext)();
  if(_ac.state==='suspended')_ac.resume();
  return _ac;
}
function _tone(freq,t,dur,type='sine',vol=0.12,f2=null){
  const ctx=_ctx(),osc=ctx.createOscillator(),g=ctx.createGain();
  osc.connect(g);g.connect(ctx.destination);
  osc.type=type;osc.frequency.setValueAtTime(freq,t);
  if(f2)osc.frequency.exponentialRampToValueAtTime(f2,t+dur*0.9);
  g.gain.setValueAtTime(vol,t);g.gain.exponentialRampToValueAtTime(0.0001,t+dur);
  osc.start(t);osc.stop(t+dur+0.01);
}
function playSound(type){
  try{
    const ctx=_ctx(),t=ctx.currentTime;
    if(type==='click'){
      // crisp AI tap: high-freq descending chirp
      _tone(1800,t,0.055,'sine',0.08,700);
    } else if(type==='tab'){
      // two-note ascending ping
      _tone(600,t,0.04,'sine',0.1);
      _tone(1050,t+0.045,0.055,'sine',0.09);
    } else if(type==='open'){
      // rising sweep — modal opening
      _tone(400,t,0.09,'sine',0.11,1600);
      _tone(800,t,0.09,'sine',0.05,3200);
    } else if(type==='close'){
      // falling sweep — modal closing
      _tone(1600,t,0.08,'sine',0.1,400);
    } else if(type==='check'){
      // confirmation chirp: two ascending tones
      _tone(880,t,0.06,'sine',0.13);
      _tone(1320,t+0.065,0.09,'sine',0.11);
    } else if(type==='uncheck'){
      // reverse: descending pair
      _tone(1320,t,0.06,'sine',0.1);
      _tone(660,t+0.065,0.08,'sine',0.08);
    } else if(type==='save'){
      // 3-note positive confirm
      [[700,0],[1050,0.07],[1400,0.14]].forEach(([f,d])=>_tone(f,t+d,0.08,'sine',0.11));
    } else if(type==='delete'){
      // 2-note descending warning, square wave
      _tone(500,t,0.09,'square',0.07);
      _tone(280,t+0.1,0.12,'square',0.06);
    } else if(type==='emoji'){
      // soft high tick
      _tone(2200,t,0.035,'sine',0.07,1400);
    } else if(type==='step'){
      // subtle stepper click
      _tone(900,t,0.04,'sine',0.07,1100);
    } else if(type==='perfect'){
      // 4-note AI fanfare
      [[523,0],[784,0.09],[1047,0.18],[1568,0.27]].forEach(([f,d])=>_tone(f,t+d,0.13,'sine',0.12));
    } else if(type==='levelup'){
      // triumphant AI arpeggio with harmonics
      [[523,0],[659,0.1],[784,0.2],[1047,0.3],[1319,0.42],[1047,0.55]].forEach(([f,d])=>{
        _tone(f,t+d,0.18,'sine',0.13);
        _tone(f*2,t+d,0.12,'sine',0.04);
      });
    }
  }catch(e){}
}

// ── Heatmap ───────────────────────────────────────────────────────
function renderHeatmap(){
  const now=new Date(),T=today();const light=isLightMode();
  const todayDow=now.getDay();
  const startDate=new Date(now.getFullYear(),now.getMonth(),now.getDate()-todayDow-11*7);
  let monthRow='',cols='',lastMonth=-1;
  for(let w=0;w<12;w++){
    const weekSun=new Date(startDate.getFullYear(),startDate.getMonth(),startDate.getDate()+w*7);
    const m=weekSun.getMonth();
    const showMonth=m!==lastMonth;if(showMonth)lastMonth=m;
    monthRow+=`<div class="hm-month-cell">${showMonth?weekSun.toLocaleDateString('en-US',{month:'short'}):''}</div>`;
    let cells='';
    for(let d=0;d<7;d++){
      const cellDate=new Date(weekSun.getFullYear(),weekSun.getMonth(),weekSun.getDate()+d);
      const cellStr=ds(cellDate);
      if(cellStr>T){cells+=`<div class="hcell hcell-future"></div>`;continue;}
      const active=S.habits.filter(h=>h.createdAt<=cellStr);
      if(!active.length){cells+=`<div class="hcell" title="${cellStr}"></div>`;continue;}
      const done=active.filter(h=>(S.completions[h.id]||{})[cellStr]===true).length;
      const pct=Math.round(done/active.length*100);
      const color=pct===0?(light?'rgba(0,0,0,0.07)':'rgba(255,255,255,0.05)'):pct<50?'rgba(59,130,246,0.3)':pct<100?'rgba(59,130,246,0.7)':'rgba(59,130,246,1)';
      const isToday=cellStr===T;
      const lbl=new Date(cellStr+'T12:00').toLocaleDateString('en-US',{weekday:'short',month:'short',day:'numeric'});
      cells+=`<div class="hcell${isToday?' hcell-today':''}" style="background:${color}" title="${lbl}: ${done}/${active.length} habits"></div>`;
    }
    cols+=`<div class="hcol">${cells}</div>`;
  }
  return`<div class="heatmap-section"><div class="hm-outer">
    <div class="hm-month-row">${monthRow}</div>
    <div class="hm-grid-row">
      <div class="hm-day-col">
        <div class="hm-day-lbl"></div><div class="hm-day-lbl">M</div>
        <div class="hm-day-lbl"></div><div class="hm-day-lbl">W</div>
        <div class="hm-day-lbl"></div><div class="hm-day-lbl">F</div>
        <div class="hm-day-lbl"></div>
      </div>
      <div class="heatmap">${cols}</div>
    </div>
    <div class="hm-legend">
      <span style="font-size:9px;color:var(--text-muted)">Less</span>
      <div class="hm-legend-cell" style="background:rgba(255,255,255,0.06)"></div>
      <div class="hm-legend-cell" style="background:rgba(59,130,246,0.35)"></div>
      <div class="hm-legend-cell" style="background:rgba(59,130,246,0.75)"></div>
      <div class="hm-legend-cell" style="background:rgba(59,130,246,1)"></div>
      <span style="font-size:9px;color:var(--text-muted)">More</span>
    </div>
  </div></div>`;
}

function toggleHabit(id){
  if(!S.completions[id])S.completions[id]={};
  const T=today();
  const wasDone=S.completions[id][T]===true;
  S.completions[id][T]=!wasDone;
  if(!S.completions[id][T])delete S.completions[id][T];
  save();
  const newLvl=levelFromXP(computeXP());
  if(newLvl>S.seenLevel){S.levelUpTo=newLvl;S.seenLevel=newLvl;localStorage.setItem('briz_seen_lvl',newLvl);S.modal='levelup';}
  else if(!wasDone&&S.habits.length>0){
    const doneNow=S.habits.filter(h=>(S.completions[h.id]||{})[T]===true).length;
    const pctNow=doneNow/S.habits.length;
    const shownDate=localStorage.getItem('briz_streak_date')||'';
    const shownPct=shownDate===T?parseInt(localStorage.getItem('briz_streak_pct')||'0'):0;
    if(pctNow>=1&&shownPct>=60){
      localStorage.setItem('briz_streak_date',T);localStorage.setItem('briz_streak_pct','100');
      render();showPerfectDay();return;
    } else if(pctNow>=0.6&&shownPct<60){
      localStorage.setItem('briz_streak_date',T);localStorage.setItem('briz_streak_pct','60');
      S.streakType='sixty';S.modal='streak';
    }
  }
  render();
  if(wasDone){playSound('uncheck');}
  if(!wasDone){
    playSound('check');
    requestAnimationFrame(()=>{
      const row=document.querySelector(`[data-hid="${id}"]`);
      if(row){const chk=row.querySelector('.habit-check');if(chk){chk.classList.add('popping');setTimeout(()=>chk.classList.remove('popping'),400);}}
      const doneNow=S.habits.filter(h=>(S.completions[h.id]||{})[today()]===true).length;
      // perfect day handled by showPerfectDay() above
    });
  }
}

// ── History Analytics Helpers ─────────────────────────────────────
function consistencyStreak(){
  let n=0;
  // If today hasn't hit 60% yet, start counting from yesterday so existing streak still shows
  const T=today();
  const activeToday=S.habits.filter(h=>h.createdAt<=T);
  const doneToday=activeToday.filter(h=>(S.completions[h.id]||{})[T]===true).length;
  const startI=(activeToday.length&&doneToday/activeToday.length>=0.6)?0:1;
  for(let i=startI;i<365;i++){
    const d=daysAgo(i);
    const active=S.habits.filter(h=>h.createdAt<=d);
    if(!active.length)break;
    const done=active.filter(h=>(S.completions[h.id]||{})[d]===true).length;
    if(done/active.length>=0.6)n++;
    else break;
  }
  return n;
}
function getHabitPerformance(){
  return S.habits.map(h=>{
    const comp=S.completions[h.id]||{};
    let done30=0,pos30=0,done30p=0,pos30p=0,skips7=0;
    for(let i=1;i<=30;i++){const d=daysAgo(i);if(d>=h.createdAt){pos30++;if(comp[d]===true)done30++;else if(i<=7)skips7++;}}
    for(let i=31;i<=60;i++){const d=daysAgo(i);if(d>=h.createdAt){pos30p++;if(comp[d]===true)done30p++;}}
    const pct30=pos30?Math.round(done30/pos30*100):0;
    const pct30prev=pos30p?Math.round(done30p/pos30p*100):0;
    return{h,pct30,trend:pct30-pct30prev,skips7};
  }).sort((a,b)=>b.pct30-a.pct30);
}
function fireMsg(n){
  if(n===0)return'Light the spark — start today.';
  if(n<=3)return'The fire is growing. Don\'t stop.';
  if(n<=7)return'One week of fire. Keep going.';
  if(n<=14)return'Two weeks strong. You\'re building.';
  if(n<=30)return'Your fire is raging. Do not let it die.';
  return'Unstoppable. You are the discipline.';
}
function renderStreakCalendar(){
  const now=new Date();const yr=now.getFullYear();const mo=now.getMonth();
  const monthName=now.toLocaleString('en-US',{month:'long'});
  const firstDow=new Date(yr,mo,1).getDay();
  const daysInMo=new Date(yr,mo+1,0).getDate();
  const T=today();
  const str=consistencyStreak();
  let cells='';
  for(let i=0;i<firstDow;i++)cells+=`<div class="sc-cell"></div>`;
  for(let d=1;d<=daysInMo;d++){
    const dateStr=`${yr}-${String(mo+1).padStart(2,'0')}-${String(d).padStart(2,'0')}`;
    const future=dateStr>T;const isToday=dateStr===T;
    if(future){cells+=`<div class="sc-cell s-future">${d}</div>`;continue;}
    const active=S.habits.filter(h=>h.createdAt<=dateStr);
    const done=active.filter(h=>(S.completions[h.id]||{})[dateStr]===true).length;
    const pct=active.length?done/active.length:0;
    let cls=isToday?'s-now':pct>=0.6?'s-hit':pct>0?'s-part':'s-miss';
    cells+=`<div class="sc-cell ${cls}">${pct>=0.6&&!isToday?'✓':d}</div>`;
  }
  return`<div class="section-title">STREAK CALENDAR</div>
  <div class="sc-wrap"><div class="sc-card">
    <div class="sc-head">
      <div class="sc-month">${monthName} ${yr}</div>
      <div class="sc-streak-pill" style="display:flex;align-items:center;gap:4px">${FLAME_ICON}<span>${str} day${str!==1?'s':''}</span></div>
    </div>
    <div class="sc-dow"><span>S</span><span>M</span><span>T</span><span>W</span><span>T</span><span>F</span><span>S</span></div>
    <div class="sc-grid">${cells}</div>
  </div></div>`;
}
function renderRadarChart(perf){
  const n=Math.min(perf.length,6);
  if(n<2)return'';
  const cx=100,cy=100,maxR=72;
  const ang=i=>-Math.PI/2+i*(2*Math.PI/n);
  const pt=(i,r)=>`${cx+r*Math.cos(ang(i))},${cy+r*Math.sin(ang(i))}`;
  let grid='';
  [0.33,0.66,1].forEach(f=>{
    const pts=Array.from({length:n},(_,i)=>pt(i,maxR*f)).join(' ');
    grid+=`<polygon points="${pts}" fill="none" stroke="rgba(255,255,255,0.07)" stroke-width="1"/>`;
  });
  const axes=Array.from({length:n},(_,i)=>`<line x1="${cx}" y1="${cy}" x2="${pt(i,maxR).split(',')[0]}" y2="${pt(i,maxR).split(',')[1]}" stroke="rgba(255,255,255,0.06)" stroke-width="1"/>`).join('');
  const dataPts=perf.slice(0,n).map((p,i)=>pt(i,maxR*(Math.max(p.pct30,4)/100))).join(' ');
  const data=`<polygon points="${dataPts}" fill="rgba(59,130,246,0.18)" stroke="#3B82F6" stroke-width="1.5"/>`;
  const dots=perf.slice(0,n).map((p,i)=>{const[x,y]=pt(i,maxR*(Math.max(p.pct30,4)/100)).split(',');return`<circle cx="${x}" cy="${y}" r="3" fill="#3B82F6"/>`;}).join('');
  const labels=perf.slice(0,n).map((p,i)=>{const[x,y]=pt(i,maxR+16).split(',');return`<text x="${x}" y="${y}" text-anchor="middle" dominant-baseline="middle" font-size="14">${p.h.icon}</text>`;}).join('');
  return`<div class="radar-wrap">
    <div class="section-title">PERFORMANCE RADAR</div>
    <div class="radar-card">
      <svg viewBox="0 0 200 200" class="radar-svg">${grid}${axes}${data}${dots}${labels}</svg>
    </div>
  </div>`;
}

function renderProgress(){
  const xp=computeXP();
  const lv=levelFromXP(xp);
  const lvData=LEVELS[lv-1]||LEVELS[0];
  const nextLvData=LEVELS[lv]||null;
  const curThresh=LEVEL_THRESHOLDS[lv-1]||0;
  const nextThresh=lv<10?LEVEL_THRESHOLDS[lv]:curThresh+1;
  const xpInLevel=xp-curThresh;
  const xpNeeded=nextThresh-curThresh;
  const xpPct=lv>=10?100:Math.min(Math.round(xpInLevel/xpNeeded*100),99);
  const xpLabel=lv>=10?`MAX LEVEL`:`${fmtXP(xpInLevel)} / ${fmtXP(xpNeeded)} XP`;
  const nextLabel=lv>=10?'':`Next: ${nextLvData?nextLvData.name:'Max'}`;

  const gridHTML=LEVELS.map((l,i)=>{
    const lvNum=i+1;
    const isCur=lvNum===lv;
    const isPast=lvNum<lv;
    const cls=isCur?'current':isPast?'achieved':'locked';
    const idAttr=isCur?' id="badge-cur"':'';
    return`<div class="lvl-badge-card ${cls}"${idAttr}>
      ${isPast?`<div class="badge-check">✓</div>`:''}
      <div class="badge-icon">${LEVEL_BADGES[i]}</div>
      <div class="badge-name">${l.name}</div>
      <div class="badge-lv">Level ${lvNum}</div>
    </div>`;
  }).join('');

  return`<div class="prog-hero" style="padding-top:16px;padding-bottom:32px">
    <div style="font-size:11px;color:var(--text-sub);letter-spacing:3px;text-transform:uppercase;margin-bottom:14px">Current Rank</div>
    <div style="width:110px;height:110px;margin:0 auto;filter:drop-shadow(0 0 22px rgba(59,130,246,0.7));animation:rankFloat 3s ease-in-out infinite">${LEVEL_BADGES[lv-1]}</div>
    <div style="font-size:34px;font-weight:900;margin-top:16px;margin-bottom:4px" class="rank-grad">${lvData.name}</div>
    <div style="font-size:14px;color:var(--text-sub);margin-bottom:26px">Level ${lv}</div>
    <div class="xp-bar-wrap2" style="margin:0 0 8px"><div id="xp-bar-fill" data-pct="${xpPct}" style="width:0"></div></div>
    <div style="display:flex;justify-content:space-between;padding:0 4px;font-size:11px;color:var(--text-sub)">${xpLabel}<span>${nextLabel}</span></div>
  </div>
  <div class="section-title">Level Progression</div>
  <div style="text-align:center;font-size:12px;color:var(--text-muted);margin:-10px 20px 18px">Level up your character in real life. Complete habits and climb the ranks.</div>
  <div class="lvl-grid">${gridHTML}</div>
  <div class="pb"></div>`;
}

// ── CHALLENGES SCREEN ─────────────────────────────────────────────
function renderChallenges(){
  _checkExpiredChallenges();
  const T=today();
  const active=CHALLENGES.filter(ch=>S.challenges[ch.id]?.status==='active');
  const finished=CHALLENGES.filter(ch=>S.challenges[ch.id]?.status==='completed'||S.challenges[ch.id]?.status==='finished');
  const activeIds=new Set([...active,...finished].map(c=>c.id));
  const available=CHALLENGES.filter(ch=>!activeIds.has(ch.id));

  let html='';

  // Active challenges
  if(active.length){
    html+=`<div class="section-title" style="margin-top:8px">ACTIVE</div>`;
    html+=active.map(ch=>{
      const data=S.challenges[ch.id];
      const startDate=new Date(data.startDate+'T12:00');
      const elapsed=Math.floor((new Date(T+'T12:00')-startDate)/86400000);
      const dayNum=Math.min(elapsed+1,ch.duration);
      const daysLeft=Math.max(0,ch.duration-dayNum);
      const done=Object.values(data.completions||{}).filter(Boolean).length;
      const missed=dayNum-done;
      const pct=Math.round(done/ch.duration*100);
      const checkedToday=data.completions[T]===true;
      const totalXP=ch.xpPerDay*ch.duration+ch.xpBonus;
      const earnedXP=done*ch.xpPerDay+(done>=ch.duration?ch.xpBonus:0);
      const light=isLightMode();
      const checkinBtn=checkedToday
        ?`<button class="ch-checkin-btn ch-checked" onclick="checkInChallenge('${ch.id}')">✓ Checked in today</button>`
        :`<button class="ch-checkin-btn" onclick="checkInChallenge('${ch.id}')">Check In Today →</button>`;
      return`<div class="ch-active-card" style="border-left:3px solid ${ch.color}">
        <div style="display:flex;align-items:center;gap:13px;margin-bottom:14px">
          <div style="font-size:30px;line-height:1;flex-shrink:0">${ch.icon}</div>
          <div style="flex:1;min-width:0">
            <div style="font-size:15px;font-weight:800;color:var(--white);white-space:nowrap;overflow:hidden;text-overflow:ellipsis">${ch.name}</div>
            <div style="font-size:11px;color:var(--text-muted);margin-top:2px">Day ${dayNum} of ${ch.duration} · ${daysLeft>0?daysLeft+' days left':'Last day!'}</div>
          </div>
          <div style="text-align:right;flex-shrink:0">
            <div style="font-size:15px;font-weight:900;color:${ch.color}">+${earnedXP}</div>
            <div style="font-size:9px;color:var(--text-muted);font-weight:600">/ ${totalXP} XP</div>
          </div>
        </div>
        <div style="background:var(--border);border-radius:999px;height:5px;margin-bottom:7px;overflow:hidden">
          <div style="height:100%;border-radius:999px;background:${ch.color};width:${pct}%;transition:width .6s"></div>
        </div>
        <div style="font-size:11px;color:var(--text-muted);margin-bottom:13px">${done} completed · ${missed} missed · ${pct}%</div>
        ${checkinBtn}
        <button class="ch-abandon-btn" onclick="abandonChallenge('${ch.id}')">Abandon challenge</button>
      </div>`;
    }).join('');
  }

  // Completed / finished challenges
  if(finished.length){
    html+=`<div class="section-title">COMPLETED</div>
    <div class="ch-finished-list">
      ${finished.map(ch=>{
        const data=S.challenges[ch.id];
        const done=Object.values(data.completions||{}).filter(Boolean).length;
        const earnedXP=done*ch.xpPerDay+(data.status==='completed'?ch.xpBonus:0);
        const icon=data.status==='completed'?'✓':'·';
        const col=data.status==='completed'?'#10B981':'var(--text-muted)';
        return`<div class="ch-fin-row">
          <span style="font-size:18px">${ch.icon}</span>
          <div style="flex:1;min-width:0"><div class="ch-fin-name">${ch.name}</div><div class="ch-fin-sub">${done}/${ch.duration} days</div></div>
          <div style="font-size:12px;font-weight:800;color:${col};flex-shrink:0">+${earnedXP} XP</div>
          <span style="font-size:16px;color:${col};flex-shrink:0;margin-left:6px">${icon}</span>
        </div>`;
      }).join('')}
    </div>`;
  }

  // Available challenges
  if(available.length){
    html+=`<div class="section-title">${active.length||finished.length?'ALL CHALLENGES':'CHALLENGES'}</div>`;
    html+=available.map(ch=>{
      const totalXP=ch.xpPerDay*ch.duration+ch.xpBonus;
      const abandoned=S.challenges[ch.id]?.status==='abandoned';
      return`<div class="ch-card">
        <div class="ch-card-top">
          <div style="display:flex;align-items:flex-start;gap:12px;flex:1;min-width:0">
            <div class="ch-icon-wrap" style="background:${ch.color}1A">${ch.icon}</div>
            <div style="min-width:0">
              <div class="ch-name">${ch.name}</div>
              <div class="ch-meta">
                <span class="ch-cat" style="background:${ch.color}1A;color:${ch.color}">${ch.category}</span>
                <span class="ch-dur">${ch.duration} days</span>
              </div>
            </div>
          </div>
          <div class="ch-xp-pill">⚡ ${totalXP}</div>
        </div>
        <div class="ch-tagline">"${ch.tagline}"</div>
        <div class="ch-desc">${ch.desc}</div>
        <div class="ch-task-block">
          <div class="ch-task-lbl">DAILY TASK</div>
          <div class="ch-task-txt">→ ${ch.task}</div>
        </div>
        <button class="ch-join-btn" onclick="joinChallenge('${ch.id}')">${abandoned?'Retry Challenge →':'Take Challenge →'}</button>
      </div>`;
    }).join('');
  }

  if(!html){
    html=`<div style="text-align:center;padding:60px 24px 40px">
      <div style="font-size:48px;margin-bottom:16px">🏆</div>
      <div style="font-size:16px;font-weight:800;color:var(--white);margin-bottom:8px">All challenges taken!</div>
      <div style="font-size:13px;color:var(--text-muted)">Complete them to earn your XP</div>
    </div>`;
  }

  return html+'<div class="pb"></div>';
}

// ── Challenges Logic ──────────────────────────────────────────────
function _chalEndDate(data,ch){
  const start=new Date(data.startDate+'T12:00');
  const end=new Date(start);
  end.setDate(end.getDate()+ch.duration-1);
  return ds(end);
}
function _checkExpiredChallenges(){
  const T=today();
  let changed=false;
  CHALLENGES.forEach(ch=>{
    const data=S.challenges[ch.id];
    if(!data||data.status!=='active')return;
    if(T>_chalEndDate(data,ch)){
      const done=Object.values(data.completions||{}).filter(Boolean).length;
      data.status=done>=ch.duration?'completed':'finished';
      changed=true;
    }
  });
  if(changed)save();
}
function joinChallenge(id){
  const data=S.challenges[id];
  if(data&&data.status==='active')return;
  S.challenges[id]={startDate:today(),completions:{},status:'active'};
  save();
  S.tab='challenges';
  render();
}
function checkInChallenge(id){
  const data=S.challenges[id];
  const ch=CHALLENGES.find(c=>c.id===id);
  if(!data||!ch)return;
  const T=today();
  if(data.completions[T]){
    delete data.completions[T];
  }else{
    data.completions[T]=true;
    const done=Object.values(data.completions).filter(Boolean).length;
    if(done>=ch.duration)data.status='completed';
  }
  save();
  const newLvl=levelFromXP(computeXP());
  if(newLvl>S.seenLevel){S.levelUpTo=newLvl;S.seenLevel=newLvl;localStorage.setItem('briz_seen_lvl',newLvl);S.modal='levelup';}
  render();
}
function abandonChallenge(id){
  if(!confirm('Abandon this challenge?\nYou\'ll keep XP earned so far.'))return;
  if(S.challenges[id])S.challenges[id].status='abandoned';
  save();
  render();
}

function obNext(){
  const s=S.onboard.step;
  if(s===0&&!S.onboard.goal)return;
  if(s===1&&!S.onboard.level)return;
  if(s===2&&!S.onboard.challenge)return;
  if(s===3&&!S.onboard.time)return;
  S.onboard.step++;
  if(S.onboard.step===4)buildObHabits();

function buildObHabits(){
  const base=ONBOARD_HABITS[S.onboard.goal]||ONBOARD_HABITS.allround;
  const t=S.onboard.time;
  let filtered=t==='morning'?base.filter(h=>h.timeOfDay!=='evening'&&h.timeOfDay!=='night')
              :t==='evening'?base.filter(h=>h.timeOfDay!=='morning')
              :base;
  if(!filtered.length)filtered=base;
  const countMap={fresh:2,returning:3,growing:4,allin:5};
  let count=countMap[S.onboard.level]||3;
  if(S.onboard.challenge==='busy')count=Math.max(2,count-1);
  S.onboard.habits=filtered.slice(0,Math.min(count,filtered.length));
  S.onboard.sel=S.onboard.habits.map((_,i)=>i);
}
function toggleObHabit(i){
  const idx=S.onboard.sel.indexOf(i);
  if(idx>=0)S.onboard.sel.splice(idx,1);else S.onboard.sel.push(i);
  render();
}
function finishOnboard(){
  const chosen=(S.onboard.habits||[]).filter((_,i)=>S.onboard.sel.includes(i));

  const now=Date.now();
  S.habits=chosen.map((h,i)=>({...h,id:String(now+i),description:'',createdAt:today()}));
  saveHabits();

  S.screen='app';S.modal=null;
  render();
}
